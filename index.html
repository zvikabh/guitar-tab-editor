<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Tab Editor</title>
  <link rel="icon" type="image/png" href="static/icons/fingerpick.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body>
  <!-- Toolbar -->
  <nav class="navbar navbar-expand bg-light border-bottom px-2 py-2" id="toolbar">
    <div class="d-flex flex-wrap align-items-center gap-2 w-100">

      <!-- Edit Mode Selector -->
      <div class="btn-group btn-group-sm" role="group" aria-label="Edit mode">
        <input type="radio" class="btn-check" name="editMode" id="modeRaw" value="raw">
        <label class="btn btn-outline-secondary" for="modeRaw">
          <img src="static/icons/raw.png" alt="" width="32" height="32" class="icon">
          <span class="d-none d-md-inline">Raw</span>
        </label>
        <input type="radio" class="btn-check" name="editMode" id="modeNote" value="note">
        <label class="btn btn-outline-secondary" for="modeNote">
          <img src="static/icons/note.png" alt="" width="32" height="32" class="icon">
          <span class="d-none d-md-inline">Note</span>
        </label>
        <input type="radio" class="btn-check" name="editMode" id="modeFingerpick" value="fingerpick" checked>
        <label class="btn btn-outline-secondary" for="modeFingerpick">
          <img src="static/icons/fingerpick.png" alt="" width="32" height="32" class="icon">
          <span class="d-none d-md-inline">Fingerpick</span>
        </label>
      </div>

      <!-- File Operations -->
      <div class="btn-group btn-group-sm" role="group" aria-label="File">
        <button class="btn btn-outline-secondary" id="btnOpen" type="button">
          <img src="static/icons/folder2-open.svg" alt="" width="16" height="16" class="icon">
          <span class="d-none d-lg-inline">Open</span>
        </button>
        <button class="btn btn-outline-secondary" id="btnSave" type="button">
          <img src="static/icons/floppy.svg" alt="" width="16" height="16" class="icon">
          <span class="d-none d-lg-inline">Save</span>
        </button>
        <button class="btn btn-outline-secondary" id="btnCopy" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" class="icon"><rect x="4" y="4" width="9" height="11" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V2a1 1 0 011-1h7" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          <span class="d-none d-lg-inline">Copy</span>
        </button>
      </div>

      <!-- Undo/Redo -->
      <div class="btn-group btn-group-sm" role="group" aria-label="Undo/Redo">
        <button class="btn btn-outline-secondary" id="btnUndo" type="button" disabled>
          <img src="static/icons/arrow-counterclockwise.svg" alt="" width="16" height="16" class="icon">
        </button>
        <button class="btn btn-outline-secondary" id="btnRedo" type="button" disabled>
          <img src="static/icons/arrow-clockwise.svg" alt="" width="16" height="16" class="icon">
        </button>
      </div>

      <div class="vr d-none d-sm-block"></div>

      <!-- Note Length (disabled in Raw mode) — music note icons -->
      <div class="btn-group btn-group-sm mode-dependent" role="group" aria-label="Note length">
        <input type="radio" class="btn-check" name="noteLength" id="len16" value="1/16">
        <label class="btn btn-outline-primary" for="len16" title="Sixteenth note">
          <svg width="24" height="24" viewBox="0 0 24 24"><line x1="14" y1="2" x2="14" y2="18" stroke="currentColor" stroke-width="1.5"/><ellipse cx="9" cy="18.5" rx="5" ry="3.2" fill="currentColor" transform="rotate(-20,9,18.5)"/><path d="M14,2 C21,4 21,9 14,10" fill="none" stroke="currentColor" stroke-width="2"/><path d="M14,7 C21,9 21,14 14,15" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </label>
        <input type="radio" class="btn-check" name="noteLength" id="len8" value="1/8" checked>
        <label class="btn btn-outline-primary" for="len8" title="Eighth note">
          <svg width="24" height="24" viewBox="0 0 24 24"><line x1="14" y1="2" x2="14" y2="18" stroke="currentColor" stroke-width="1.5"/><ellipse cx="9" cy="18.5" rx="5" ry="3.2" fill="currentColor" transform="rotate(-20,9,18.5)"/><path d="M14,2 C21,4 21,10 14,12" fill="none" stroke="currentColor" stroke-width="2"/></svg>
        </label>
        <input type="radio" class="btn-check" name="noteLength" id="len4" value="1/4">
        <label class="btn btn-outline-primary" for="len4" title="Quarter note">
          <svg width="24" height="24" viewBox="0 0 24 24"><line x1="14" y1="2" x2="14" y2="18" stroke="currentColor" stroke-width="1.5"/><ellipse cx="9" cy="18.5" rx="5" ry="3.2" fill="currentColor" transform="rotate(-20,9,18.5)"/></svg>
        </label>
        <input type="radio" class="btn-check" name="noteLength" id="len2" value="1/2">
        <label class="btn btn-outline-primary" for="len2" title="Half note">
          <svg width="24" height="24" viewBox="0 0 24 24"><line x1="14" y1="2" x2="14" y2="18" stroke="currentColor" stroke-width="1.5"/><ellipse cx="9" cy="18.5" rx="5" ry="3.2" fill="none" stroke="currentColor" stroke-width="1.8" transform="rotate(-20,9,18.5)"/></svg>
        </label>
      </div>

      <div class="vr d-none d-sm-block"></div>

      <!-- Bar/Repeat/Rest/Chord (disabled in Raw mode) — music notation icons -->
      <div class="btn-group btn-group-sm mode-dependent" role="group" aria-label="Insert">
        <button class="btn btn-outline-secondary" id="btnBar" type="button" title="Bar line">
          <svg width="16" height="16" viewBox="0 0 16 16"><line x1="8" y1="1" x2="8" y2="15" stroke="currentColor" stroke-width="2"/></svg>
        </button>
        <button class="btn btn-outline-secondary" id="btnRepeatStart" type="button" title="Repeat start |:">
          <svg width="16" height="16" viewBox="0 0 16 16"><line x1="4" y1="1" x2="4" y2="15" stroke="currentColor" stroke-width="2"/><line x1="7" y1="1" x2="7" y2="15" stroke="currentColor" stroke-width="1"/><circle cx="11" cy="6" r="1.5" fill="currentColor"/><circle cx="11" cy="10" r="1.5" fill="currentColor"/></svg>
        </button>
        <button class="btn btn-outline-secondary" id="btnRepeatEnd" type="button" title="Repeat end :|">
          <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="5" cy="6" r="1.5" fill="currentColor"/><circle cx="5" cy="10" r="1.5" fill="currentColor"/><line x1="9" y1="1" x2="9" y2="15" stroke="currentColor" stroke-width="1"/><line x1="12" y1="1" x2="12" y2="15" stroke="currentColor" stroke-width="2"/></svg>
        </button>
      </div>

      <button class="btn btn-sm btn-outline-secondary mode-dependent" id="btnRest" type="button">
        <img src="static/icons/dash-lg.svg" alt="" width="16" height="16" class="icon">
        <span class="d-none d-lg-inline">Rest</span>
      </button>

      <button class="btn btn-sm btn-outline-info mode-dependent" id="btnChord" type="button">
        <img src="static/icons/layers.svg" alt="" width="16" height="16" class="icon">
        <span class="d-none d-lg-inline">Chord</span>
      </button>

    </div>
  </nav>

  <!-- Panel (mode-dependent, full width) -->
  <div id="panel" class="border-bottom bg-white">
    <div id="panel-raw" class="panel-content d-none p-2 text-muted small">
      <!-- Empty in Raw mode, or minimal help text -->
    </div>
    <div id="panel-note" class="panel-content d-none p-2">
      <!-- Guitar fretboard schematic (Phase 4) -->
      <div class="text-muted text-center py-3">Guitar fretboard panel (Note Edit mode)</div>
    </div>
    <div id="panel-fingerpick" class="panel-content d-none p-2">
      <!-- Chord table + mini strings (Phase 5) -->
      <div class="text-muted text-center py-3">Chord table panel (Fingerpick Edit mode)</div>
    </div>
  </div>

  <!-- Editor Area -->
  <div id="editor-container" class="flex-grow-1 overflow-auto">
    <div class="tab-editor" id="tab-editor" tabindex="0" role="textbox" aria-multiline="true">
      <!-- Document blocks rendered here by editor.js -->
    </div>
    <div id="cursor" class="cursor"></div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="fileInput" accept=".txt,.tab" class="d-none">

  <!-- Character width measurement element -->
  <span id="char-measure" class="char-measure">M</span>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
